name: PSX Sector Monitor

# ══════════════════════════════════════════════════════════════════
#  PSX Market Hours: 9:30 AM – 3:30 PM PKT (UTC+5)
#  This runs at 3:40 PM PKT = 10:40 AM UTC — 10 min after close
#  (Changed from 5:30 PM to match working Trend Scanner timing)
# ══════════════════════════════════════════════════════════════════

on:
  schedule:
    # 3:40 PM PKT = 10:40 AM UTC — Mon to Fri (PSX trading days)
    # ALIGNED WITH TREND SCANNER (both now run at same time)
    - cron: '40 10 * * 1-5'

  # Also allow manual trigger (e.g. to backfill a missed day)
  workflow_dispatch:
    inputs:
      date:
        description: 'Override date YYYY-MM-DD (leave blank for today)'
        required: false
        default: ''
      demo:
        description: 'Generate demo data (no live fetch)'
        type: boolean
        default: false

jobs:
  sector-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history to prevent non-fast-forward push errors
          # when remote has moved ahead (concurrent runs, deployments, etc.)
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Sector Monitor
        # REMOVED: continue-on-error: true
        # REASON: Was silently masking errors. We need to see real failures.
        # If market is closed or API fails, the Python script should exit 0.
        # Non-zero exits now properly fail the workflow for visibility.
        run: |
          if [ "${{ github.event.inputs.demo }}" = "true" ]; then
            if [ -n "${{ github.event.inputs.date }}" ]; then
              python psx_sector_monitor.py --demo --date "${{ github.event.inputs.date }}"
            else
              python psx_sector_monitor.py --demo
            fi
          elif [ -n "${{ github.event.inputs.date }}" ]; then
            python psx_sector_monitor.py --date "${{ github.event.inputs.date }}"
          else
            python psx_sector_monitor.py
          fi

      - name: Check for data changes
        id: changes
        run: |
          if [ -d "sectors_data" ]; then
            git add sectors_data/
            git diff --staged --quiet || echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push sector data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "PSX Sector Bot"
          git config user.email "bot@psx-sector.local"
          DATE=$(python -c "import datetime; print(datetime.date.today().isoformat())")
          git commit -m "Sector data: $DATE — post-close (3:40 PM PKT)"

          # SIMPLIFIED: Use proven pattern from working Trend Scanners
          # This pattern is more robust and handles rebase conflicts cleanly
          git pull --rebase origin main || git rebase --abort
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## PSX Sector Monitor" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(python -c 'import datetime; print(datetime.date.today())')" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** 3:40 PM PKT (10 min post-close)" >> $GITHUB_STEP_SUMMARY
          if [ -f sectors_data/index.json ]; then
            DAYS=$(python -c "import json; d=json.load(open('sectors_data/index.json')); print(len(d))" 2>/dev/null || echo "N/A")
            echo "**History:** $DAYS trading days in index" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** No data file — check workflow logs for errors" >> $GITHUB_STEP_SUMMARY
          fi
