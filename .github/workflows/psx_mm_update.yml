name: PSX Market Monitor Update

on:
  schedule:
    # 3:45 PM PKT = 10:45 AM UTC, Mon–Fri
    # Runs 10 minutes after main scanner so APIs are not hammered simultaneously
    - cron: '45 10 * * 1-5'
  workflow_dispatch:   # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    # Give the workflow permission to write back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Market Monitor Updater
        run: python psx_mm_updater.py

      - name: Commit updated mm_data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mm_data.json
          git diff --cached --quiet || git commit -m "PSX MM update $(date -u +'%Y-%m-%d')"
          git push
