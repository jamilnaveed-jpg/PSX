name: PSX Market Monitor Update

# ══════════════════════════════════════════════════════════════════
#  PSX Market Hours: 9:30 AM – 3:30 PM PKT (UTC+5)
#  Runs at 5:00 PM PKT = 12:00 UTC — 90 min after close
# ══════════════════════════════════════════════════════════════════

on:
  schedule:
    # 5:00 PM PKT = 12:00 UTC, Mon–Fri
    - cron: '0 12 * * 1-5'
  workflow_dispatch:   # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # FIX: Fetch full history so the runner never starts behind the
          # remote — prevents non-fast-forward push rejections.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Market Monitor Updater
        # FIX: continue-on-error so a closed market / holiday or transient
        # API blip doesn't fail the whole workflow and spam red run badges.
        continue-on-error: true
        run: python psx_mm_updater.py

      - name: Check for data changes
        id: changes
        run: |
          git add mm_data.json
          git diff --staged --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push mm_data.json
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "PSX MM Bot"
          git config user.email "bot@psx-mm.local"
          DATE=$(python -c "import datetime; print(datetime.date.today().isoformat())")
          git commit -m "PSX MM update: $DATE — 5:00 PM PKT"

          # FIX: Pull remote changes (rebase) before pushing, retry up to
          # 3 times to handle race conditions or concurrent pushes.
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed — retrying in 5s..."
            sleep 5
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## PSX Market Monitor Update" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(python -c 'import datetime; print(datetime.date.today())')" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** 5:00 PM PKT (90 min after PSX close)" >> $GITHUB_STEP_SUMMARY
          if [ -f mm_data.json ]; then
            echo "**Status:** mm_data.json present" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** No data file — market closed or API unavailable" >> $GITHUB_STEP_SUMMARY
          fi
