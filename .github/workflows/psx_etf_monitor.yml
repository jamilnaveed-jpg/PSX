name: PSX ETF Monitor

on:
  schedule:
    # 5:30 PM PKT = 12:30 UTC  (2 hours after 3:30 PM PSX close), Mon–Fri
    - cron: '30 12 * * 1-5'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run ETF Monitor
        run: python psx_etf_monitor.py

      - name: Commit ETF data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add etf_data/
          git diff --cached --quiet || git commit -m "ETF monitor $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
